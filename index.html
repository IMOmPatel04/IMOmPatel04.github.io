<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Weather App</title>
    <!-- Favicon and Apple home screen icons -->
    <link rel="icon" type="image/x-icon" href="Images/favicon.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone60x60.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touch-icon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touch-icon-ipad-retina-152x152.png">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        /* Make the weather condition icon large enough to be seen */
        .weather-icon {
            font-size: 64px;
        }
        /* Slightly larger text for temperature and humidity */
        .temp-humidity {
            font-size: 22px;
        }
    </style>
</head>
<body class="bg-dark">

    <div class="d-flex justify-content-center align-items-center min-vh-100 py-4">
        <div class="col-11 col-md-8 col-lg-5">

            <!-- Loading Card -->
            <div class="card text-center p-4" id="divLoading">
                <p class="text-muted mb-0">
                    <i class="bi bi-arrow-repeat"></i> Getting your weather...
                </p>
            </div>

            <!-- Weather Card will stay hidden until data loads -->
            <div class="card" id="divWeather" style="display: none;">
                <div class="card-body">
                    <div class="row">

                        <!-- Left column: location pin icon and city name -->
                        <div class="col-5 d-flex flex-column justify-content-center align-items-center border-end">
                            <i class="bi bi-geo-alt-fill text-danger" style="font-size: 48px;" aria-hidden="true"></i>
                            <h4 class="text-danger fw-bold text-center mt-2" id="lblCity">--</h4>
                        </div>

                        <!-- Right column: condition icon, description, temp, humidity -->
                        <div class="col-7 text-center">
                            <h5 class="text-muted mb-3">Current Conditions</h5>

                            <!-- Weather condition icon -->
                            <i id="iWeatherIcon" class="bi bi-cloud weather-icon" aria-label="Weather condition icon"></i>

                            <!-- Text description of current conditions -->
                            <p class="mt-2" id="lblCondition">--</p>

                            <hr>

                            <!-- Temperature and Humidity -->
                            <div class="d-flex justify-content-center gap-4 temp-humidity">
                                <span>
                                    <i class="bi bi-thermometer-half text-warning" aria-hidden="true"></i>
                                    <span id="lblTemp">--</span>&deg;F
                                </span>
                                <span>
                                    <i class="bi bi-droplet-fill text-primary" aria-hidden="true"></i>
                                    <span id="lblHumidity">--</span>%
                                </span>
                            </div>

                            <!-- Feels like temperature -->
                            <p class="text-muted mt-2 mb-0" style="font-size: 14px;">
                                Feels like <span id="lblFeelsLike">--</span>&deg;F
                            </p>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Error Card for when something goes wrong -->
            <div class="card text-center p-4" id="divError" style="display: none;">
                <p class="text-danger mb-0">
                    <i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i>
                    <span id="lblError">Unable to load weather data.</span>
                </p>
            </div>

            <!-- Footer with attribution link for Open Meteo -->
            <p class="text-center text-muted mt-3" style="font-size: 13px;">
                Weather data courtesy of <a href="https://open-meteo.com/" target="_blank" class="text-muted">Open Meteo</a>
            </p>

        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
